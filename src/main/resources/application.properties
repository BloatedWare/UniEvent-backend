# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/unievtdb
spring.datasource.username=unievt
spring.datasource.password=unievt
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# App
server.port=8080
spring.application.name=UniEvent-backend
